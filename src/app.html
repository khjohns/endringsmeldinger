<!doctype html>
<html lang="nb">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;500;600&family=IBM+Plex+Sans:wght@400..600&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Endringsmeldinger</title>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <script>
      (function () {
        var t = localStorage.getItem('koe-theme');
        var d =
          t === 'dark' || (t !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches);
        if (d) document.documentElement.classList.add('dark');
      })();
    </script>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
